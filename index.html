<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.A.S ESTIMATE</title>

<style>
:root{
--gold:#d4af37;
--accent:#3b82f6;
--bg:#000;
--card:#111;
--text:#fff;
--sub:#aaa;
--border:#262626;
--line:#06c755;
}

body{
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
display:flex;
justify-content:center;
}

.container{
max-width:500px;
width:100%;
padding:20px;
background:#111;
border-radius:20px;
margin-bottom:120px;
}

h2{
text-align:center;
letter-spacing:3px;
border-bottom:1px solid #333;
padding-bottom:10px;
}

.step{display:none;}
.step.active{display:block;}

/* ビフォーアフター */
.ba-wrap{
position:relative;
height:220px;
overflow:hidden;
border-radius:10px;
margin-bottom:15px;
}

.ba-wrap img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.ba-after{
clip-path:inset(0 50% 0 0);
}

#slider{
position:absolute;
bottom:10px;
width:90%;
left:5%;
}

/* カード */
.option{
background:#1a1a1a;
padding:15px;
margin-bottom:12px;
border-radius:12px;
border:1px solid #333;
cursor:pointer;
}

.option img{
width:100%;
border-radius:8px;
margin-bottom:8px;
}

.option.selected{
border:1px solid var(--accent);
background:#16213e;
}

.price{
float:right;
color:var(--accent);
font-weight:bold;
}

.desc{
font-size:0.85em;
color:#aaa;
margin-top:6px;
line-height:1.5;
}

.badge{
font-size:0.7em;
color:#d4af37;
margin-bottom:4px;
display:block;
}

/* ボタン */
button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
}

.next{background:#3b82f6;color:#fff;}
.prev{background:#222;color:#aaa;}
.line{background:#06c755;color:#fff;}

/* 合計 */
.total{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:450px;
background:#0f172a;
padding:15px;
border-radius:12px;
text-align:center;
border:1px solid var(--accent);
}

/* ハイモース */
.ultimate{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.ultimate-box{
text-align:center;
color:#d4af37;
}

.shine{
width:200px;
height:200px;
margin:20px auto;
background:linear-gradient(45deg,#000,#d4af37,#000);
animation:shine 2s infinite;
}

@keyframes shine{
0%{background-position:-200px;}
100%{background-position:200px;}
}
</style>
</head>

<body>

<div class="container">
<h2>C.A.S ESTIMATE</h2>

<!-- STEP1 -->
<div class="step active" id="step1">

<div class="ba-wrap">
<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" class="ba-after" id="afterImg">
<input type="range" min="0" max="100" value="50" id="slider">
</div>

<h3>01 車種サイズを選択</h3>

<div class="option" onclick="select('size','S')">
Sサイズ
<div class="desc">N-BOX / タント / ワゴンR</div>
</div>

<div class="option" onclick="select('size','M')">
Mサイズ
<div class="desc">ヤリス / フィット / ルーミー</div>
</div>

<div class="option" onclick="select('size','L')">
Lサイズ
<div class="desc">プリウス / ハリアー / セレナ</div>
</div>

<div class="option" onclick="select('size','2L')">
2Lサイズ
<div class="desc">アルファード / ランクル / ハイエース</div>
</div>

<button class="next" onclick="move(2)">次へ</button>
</div>

<!-- STEP2 -->
<div class="step" id="step2">
<h3>02 下地研磨を選択</h3>

<div class="option" onclick="select('polish','Light')">
<span class="price" id="p1"></span>
軽研磨（1工程）
<div class="desc">
新車・軽度な汚れ向け<br>
艶を軽く引き上げ
</div>
</div>

<div class="option" onclick="select('polish','Standard')">
<span class="price" id="p2"></span>
復元研磨（2工程）
<div class="desc">
洗車キズ除去<br
