<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーティング見積もり</title>

<style>
body{
  font-family:-apple-system;
  background:#f5f5f7;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.desc{
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}

.highlight{
  background:#f0f0f0;
  padding:8px;
  border-radius:8px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:15px;
  margin:6px 0;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

.recommend{
  border:2px solid #c9a100;
}

.gold{
  background:linear-gradient(45deg,#c9a100,#ffd700);
  color:#000;
}

.hidden{ display:none; }

.result{
  font-size:22px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<!-- STEP1 -->
<div id="step1" class="card">
<h2>STEP1：サイズ選択</h2>

<button onclick="selectSize(0,'s')">S（軽自動車）</button>
<button onclick="selectSize(7700,'m')">M（小型普通車）</button>
<button onclick="selectSize(15400,'l')">L（普通車・SUV・ミニバン）</button>
<button onclick="selectSize(23100,'2l')">2L（大型）</button>
</div>

<!-- STEP2 -->
<div id="step2" class="card hidden">
<h2>STEP2：研磨</h2>

<div id="carExample" class="highlight"></div>

<button onclick="toggle('p1')">Light ▼</button>
<div id="p1" class="desc hidden">
新車・納車から1年未満におすすめ<br>
<button onclick="selectPolish(41800)">この内容で選択</button>
</div>

<button onclick="toggle('p2')">Standard ▼</button>
<div id="p2" class="desc hidden">
小傷やくすみをバランスよく除去<br>
<button onclick="selectPolish(52800)">この内容で選択</button>
</div>

<button class="recommend" onclick="toggle('p3')">
⭐ Premium（おすすめ）▼
</button>
<div id="p3" class="desc">
高い艶と仕上がりを重視<br>
<button onclick="selectPolish(63800)">この内容で選択</button>
</div>

</div>

<!-- STEP3 -->
<div id="step3" class="card hidden">
<h2>STEP3：コーティング</h2>

<div id="carExample2" class="highlight"></div>

<button onclick="selectCoat(16500)">Basic</button>
<div class="desc">コスト重視・撥水付与</div>

<button onclick="selectCoat(22000)">Standard</button>
<div class="desc">バランス重視</div>

<button class="recommend" onclick="selectCoat(27500)">
⭐ Premium（おすすめ）
</button>
<div class="desc">艶・耐久重視</div>

<button onclick="selectCoat(38000)">EX</button>
<div class="desc">さらに上の仕上がり</div>

<button class="gold" onclick="selectCoat(200000)">
🌟 G'ZOX ハイモース
</button>
<div class="desc">完全別格の仕上がり</div>

</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2>お見積もり</h2>
<div class="result" id="price"></div>
<div id="comment" class="desc"></div>
</div>

<script>

let total = 0;
let carText = "";

// サイズ選択（←ここに統合）
function selectSize(price,type){
  total += price;

  if(type == "s"){
    carText = "対象目安：N-BOX・タント・ワゴンR";
  }
  if(type == "m"){
    carText = "対象目安：プリウス・カローラ・ノート";
  }
  if(type == "l"){
    carText = "対象目安：ハリアー・ヴォクシー・セレナ";
  }
  if(type == "2l"){
    carText = "対象目安：アルファード・ヴェルファイア・ハイエース・ランクル";
  }

  document.getElementById("carExample").innerText = carText;

  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

// 開閉
function toggle(id){
  let el = document.getElementById(id);
  el.classList.toggle("hidden");
}

// 研磨
function selectPolish(price){
  total += price;

  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");

  document.getElementById("carExample2").innerText = carText;
}

// コーティング
function selectCoat(price){
  total += price;

  document.getElementById("step3").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("price").innerText =
    "合計金額：" + total.toLocaleString() + "円";

  let comment = "";

  if(total < 90000){
    comment = "コストを抑えたプランです";
  }else if(total < 150000){
    comment = "人気のおすすめプランです";
  }else{
    comment = "最高クラスの仕上がりです";
  }

  document.getElementById("comment").innerText = comment;
}

</script>

</body>
</html>
