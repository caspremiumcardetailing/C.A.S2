<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーティング見積もり</title>

<style>
body{
  font-family:-apple-system;
  background:#f5f5f7;
  margin:0;
}

.fixed{
  position:sticky;
  top:0;
  background:#fff;
  padding:12px;
  font-weight:bold;
  border-bottom:1px solid #eee;
  z-index:999;
}

.container{ padding:20px; }

.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

.desc{
  font-size:14px;
  color:#666;
  margin:10px 0;
}

.preview{
  background:#f0f0f0;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  font-weight:bold;
}

button{
  width:100%;
  padding:15px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

.confirm{
  background:#c9a100;
  color:#000;
}

.recommend{
  border:2px solid #c9a100;
}

.gold{
  background:linear-gradient(45deg,#c9a100,#ffd700);
  color:#000;
}

.hidden{ display:none; }

.result{
  font-size:22px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<div id="fixedBar" class="fixed hidden"></div>

<div class="container">

<!-- STEP1 -->
<div id="step1" class="card">
<h2>STEP1：サイズ</h2>

<button onclick="previewSize(0,'s')">S</button>
<button onclick="previewSize(7700,'m')">M</button>
<button onclick="previewSize(15400,'l')">L</button>
<button onclick="previewSize(23100,'2l')">2L</button>

<div id="sizePreview" class="preview hidden"></div>
<button id="sizeBtn" class="confirm hidden" onclick="confirmSize()">次へ</button>
</div>

<!-- STEP2 -->
<div id="step2" class="card hidden">
<h2>STEP2：研磨</h2>

<button onclick="previewPolish(41800,'light')">Light</button>
<button onclick="previewPolish(52800,'standard')">Standard</button>
<button class="recommend" onclick="previewPolish(63800,'premium')">⭐ Premium</button>

<div id="polishPreview" class="preview hidden"></div>
<button id="polishBtn" class="confirm hidden" onclick="confirmPolish()">次へ</button>
</div>

<!-- STEP3 -->
<div id="step3" class="card hidden">
<h2>STEP3：コーティング</h2>

<button onclick="previewCoat(16500,'basic')">Basic</button>
<button onclick="previewCoat(22000,'standard')">Standard</button>
<button class="recommend" onclick="previewCoat(27500,'premium')">⭐ Premium</button>
<button onclick="previewCoat(38000,'ex')">EX</button>
<button class="gold" onclick="previewCoat(200000,'hi')">🌟 G'ZOX ハイモース</button>

<div id="coatPreview" class="preview hidden"></div>
<button id="coatBtn" class="confirm hidden" onclick="confirmCoat()">確定</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2>お見積もり</h2>
<div id="price" class="result"></div>
</div>

</div>

<script>

let total=0;
let tmpPrice=0;
let summary="";

// サイズ
function previewSize(p,t){
  tmpPrice=p;
  if(t=="s") summary="軽自動車（N-BOX等）";
  if(t=="m") summary="小型車（プリウス等）";
  if(t=="l") summary="普通車（ハリアー等）";
  if(t=="2l") summary="大型（アルファード等）";

  document.getElementById("sizePreview").innerText=summary;
  document.getElementById("sizePreview").classList.remove("hidden");
  document.getElementById("sizeBtn").classList.remove("hidden");

  updateBar();
}

// 研磨
function previewPolish(p,t){
  tmpPrice=p;
  let text="";

  if(t=="light") text="軽研磨：新車・1年未満向け";
  if(t=="standard") text="2工程：バランス重視";
  if(t=="premium") text="3工程：艶重視仕上げ";

  document.getElementById("polishPreview").innerText=text;
  document.getElementById("polishPreview").classList.remove("hidden");
  document.getElementById("polishBtn").classList.remove("hidden");

  summary+=" / "+text;
  updateBar();
}

// コーティング
function previewCoat(p,t){
  tmpPrice=p;
  let text="";

  if(t=="basic") text="Basic：コスト重視";
  if(t=="standard") text="Standard：バランス";
  if(t=="premium") text="Premium：艶・耐久";
  if(t=="ex") text="EX：高性能";
  if(t=="hi") text="G'ZOX ハイモース";

  document.getElementById("coatPreview").innerText=text;
  document.getElementById("coatPreview").classList.remove("hidden");
  document.getElementById("coatBtn").classList.remove("hidden");

  summary+=" / "+text;
  updateBar();
}

// 確定
function confirmSize(){ total+=tmpPrice; next("step1","step2"); }
function confirmPolish(){ total+=tmpPrice; next("step2","step3"); }
function confirmCoat(){
  total+=tmpPrice;
  next("step3","result");
  document.getElementById("price").innerText="合計："+total.toLocaleString()+"円";
}

// 共通
function next(a,b){
  document.getElementById(a).classList.add("hidden");
  document.getElementById(b).classList.remove("hidden");
}

function updateBar(){
  let bar=document.getElementById("fixedBar");
  bar.innerText=summary;
  bar.classList.remove("hidden");
}

</script>

</body>
</html>
