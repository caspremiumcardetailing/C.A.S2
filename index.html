<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.A.S ESTIMATE</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;display:flex;justify-content:center;}
.container{max-width:500px;width:100%;padding:20px;background:#111;border-radius:20px;margin-bottom:120px;}
h2{text-align:center;border-bottom:1px solid #333;padding-bottom:10px;}

.step{display:none;} .active{display:block;}

.option{background:#1a1a1a;padding:15px;margin-bottom:10px;border-radius:10px;border:1px solid #333;cursor:pointer;}
.option.selected{border:1px solid #3b82f6;background:#16213e;}
.option img{width:100%;border-radius:8px;margin-bottom:5px;}

.price{float:right;color:#3b82f6;font-weight:bold;}
.desc{font-size:0.85em;color:#aaa;}

button{width:100%;padding:15px;margin-top:10px;border:none;border-radius:10px;font-weight:bold;}
.next{background:#3b82f6;color:#fff;}
.prev{background:#222;color:#aaa;}
.line{background:#06c755;color:#fff;}

.total{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:90%;max-width:450px;background:#0f172a;padding:15px;border-radius:10px;text-align:center;}

.ba{position:relative;height:200px;margin-bottom:10px;}
.ba img{position:absolute;width:100%;height:100%;object-fit:cover;}
.after{clip-path:inset(0 50% 0 0);}
.slider{position:absolute;bottom:10px;width:90%;left:5%;}
</style>
</head>

<body>
<div class="container">
<h2>C.A.S ESTIMATE</h2>

<!-- STEP1 -->
<div class="step active" id="step1">

<div class="ba">
<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" class="after">
<input type="range" class="slider" min="0" max="100" value="50">
</div>

<h3>サイズ選択</h3>

<div class="option" onclick="select('size','S')">S（軽）</div>
<div class="option" onclick="select('size','M')">M（コンパクト）</div>
<div class="option" onclick="select('size','L')">L（普通車）</div>
<div class="option" onclick="select('size','2L')">2L（大型）</div>

<button class="next" onclick="move(2)">次へ</button>
</div>

<!-- STEP2 -->
<div class="step" id="step2">
<h3>研磨</h3>

<div class="option" onclick="select('polish','Light')"><span class="price" id="p1"></span>軽研磨<div class="desc">軽い艶出し</div></div>
<div class="option" onclick="select('polish','Standard')"><span class="price" id="p2"></span>復元研磨<div class="desc">キズ除去</div></div>
<div class="option" onclick="select('polish','Premium')"><span class="price" id="p3"></span>鏡面研磨<div class="desc">完全仕上げ</div></div>

<button class="prev" onclick="move(1)">戻る</button>
<button class="next" onclick="move(3)">次へ</button>
</div>

<!-- STEP3 -->
<div class="step" id="step3">
<h3>コーティング</h3>

<div class="option" onclick="select('coat','Entry')"><span id="c1" class="price"></span>Basic<div class="desc">洗車が楽</div></div>
<div class="option" onclick="select('coat','Standard')"><span id="c2" class="price"></span>Standard<div class="desc">人気No1</div></div>
<div class="option" onclick="select('coat','Premium')"><span id="c3" class="price"></span>Premium<div class="desc">艶＋耐久</div></div>
<div class="option" onclick="select('coat','Executive')"><span id="c4" class="price"></span>Executive<div class="desc">最高品質</div></div>

<div class="option" onclick="select('coat','Ultimate')">
ハイモース
<div class="desc">別格の艶</div>
<div style="color:#3b82f6;font-size:0.8em;" onclick="openHi(event)">▶ 詳細</div>
</div>

<button class="prev" onclick="move(2)">戻る</button>
<button class="next" onclick="result()">見積り</button>
</div>

<!-- RESULT -->
<div class="step" id="step4">
<h3>見積り</h3>
<div id="summary"></div>
<button class="line" onclick="sendLine()">LINEで相談</button>
<button class="prev" onclick="move(1)">やり直し</button>
</div>

</div>

<div class="total">¥<span id="total">0</span></div>

<script>
const price={
polish:{Light:{S:41800,M:49500,L:57200,'2L':64900},
Standard:{S:52800,M:60500,L:68200,'2L':75900},
Premium:{S:63800,M:71500,L:79200,'2L':86900}},
coat:{Entry:{S:14300,M:16500,L:18700,'2L':20900},
Standard:{S:27500,M:29700,L:31900,'2L':34100},
Premium:{S:40700,M:42900,L:45100,'2L':47300},
Executive:{S:57200,M:62700,L:68200,'2L':73700}}
};

let sel={size:'S'};

function select(type,val){
sel[type]=val;
event.currentTarget.parentElement.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));
event.currentTarget.classList.add('selected');
update(); calc();
}

function update(){
let s=sel.size;
p1.innerText="¥"+price.polish.Light[s].toLocaleString();
p2.innerText="¥"+price.polish.Standard[s].toLocaleString();
p3.innerText="¥"+price.polish.Premium[s].toLocaleString();
c1.innerText="¥"+price.coat.Entry[s].toLocaleString();
c2.innerText="¥"+price.coat.Standard[s].toLocaleString();
c3.innerText="¥"+price.coat.Premium[s].toLocaleString();
c4.innerText="¥"+price.coat.Executive[s].toLocaleString();
}

function calc(){
if(sel.coat==="Ultimate"){total.innerText="ASK";return;}
let t=0;
if(sel.polish) t+=price.polish[sel.polish][sel.size];
if(sel.coat) t+=price.coat[sel.coat][sel.size];
total.innerText=t.toLocaleString();
}

function move(n){
document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
document.getElementById("step"+n).classList.add('active');
}

function result(){
move(4);
summary.innerHTML=`サイズ:${sel.size}<br>研磨:${sel.polish}<br>コート:${sel.coat}<br>合計:¥${total.innerText}`;
}

function sendLine(){
const msg=`見積依頼
サイズ:${sel.size}
研磨:${sel.polish}
コート:${sel.coat}
合計:${total.innerText}

車種:
希望日:`;

window.open("https://line.me/R/ti/p/@009zapmx","_blank");

setTimeout(()=>{
window.open("https://line.me/R/msg/text/?"+encodeURIComponent(msg),"_blank");
},1500);
}

function openHi(e){e.stopPropagation();window.open("hi-mohs.html","_blank");}

document.querySelectorAll('.slider').forEach((s,i)=>{
s.oninput=function(){
document.querySelectorAll('.after')[i].style.clipPath=`inset(0 ${100-this.value}% 0 0)`
}
});

update();
</script>

</body>
</html>
