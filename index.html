<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.A.S Premium Estimator</title>

<style>
:root{
--gold:#d4af37;
--accent:#3b82f6;
--bg:#000;
--card:#111;
--text:#fff;
--sub:#aaa;
--border:#262626;
--line:#06c755;
}

body{
margin:0;
font-family:sans-serif;
background:#000;
color:#fff;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:500px;
padding:20px;
background:#111;
border-radius:20px;
margin-bottom:120px;
}

h2{
text-align:center;
letter-spacing:3px;
border-bottom:1px solid #333;
padding-bottom:10px;
}

.visual{
height:180px;
background:#222;
border-radius:10px;
margin-bottom:15px;
overflow:hidden;
}

.visual img{
width:100%;
height:100%;
object-fit:cover;
}

/* カード */
.option{
background:#1a1a1a;
padding:15px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #333;
cursor:pointer;
}

.option.selected{
border:1px solid var(--accent);
background:#16213e;
}

.price{
float:right;
color:#3b82f6;
font-weight:bold;
}

/* 下固定 */
.total{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:450px;
background:#0f172a;
padding:15px;
border-radius:12px;
text-align:center;
border:1px solid var(--accent);
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
}

.next{background:#3b82f6;color:#fff;}
.prev{background:#222;color:#aaa;}
.line{background:#06c755;color:#fff;}

.step{display:none;}
.active{display:block;}
</style>
</head>

<body>
<div class="container">

<h2>C.A.S ESTIMATE</h2>

<!-- STEP1 -->
<div class="step active" id="step1">
<div class="visual">
<img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c">
</div>

<h3>サイズ選択</h3>

<div class="option" onclick="select('size','S')">S 軽自動車</div>
<div class="option" onclick="select('size','M')">M 小型車</div>
<div class="option" onclick="select('size','L')">L 普通車</div>
<div class="option" onclick="select('size','2L')">2L 大型車</div>

<button class="next" onclick="move(2)">次へ</button>
</div>

<!-- STEP2 -->
<div class="step" id="step2">
<div class="visual">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
</div>

<h3>研磨選択</h3>

<div class="option" onclick="select('polish','Light')">
<span class="price" id="p1">¥--</span>
軽研磨
</div>

<div class="option" onclick="select('polish','Standard')">
<span class="price" id="p2">¥--</span>
復元研磨
</div>

<div class="option" onclick="select('polish','Premium')">
<span class="price" id="p3">¥--</span>
鏡面研磨
</div>

<button class="prev" onclick="move(1)">戻る</button>
<button class="next" onclick="move(3)">次へ</button>
</div>

<!-- STEP3 -->
<div class="step" id="step3">

<h3>コーティング</h3>

<div class="option" onclick="select('coat','Entry')">
<span class="price" id="c1">¥--</span>
Basic
</div>

<div class="option" onclick="select('coat','Standard')">
<span class="price" id="c2">¥--</span>
Standard
</div>

<div class="option" onclick="select('coat','Premium')">
<span class="price" id="c3">¥--</span>
Premium
</div>

<div class="option" onclick="select('coat','Executive')">
<span class="price" id="c4">¥--</span>
Executive
</div>

<div class="option" onclick="select('coat','Ultimate')">
Ultimate（ASK）
</div>

<button class="prev" onclick="move(2)">戻る</button>
<button class="next" onclick="result()">確定</button>
</div>

<!-- RESULT -->
<div class="step" id="result">
<h3>見積結果</h3>
<div id="summary"></div>

<button class="line" onclick="sendLine()">LINE相談</button>
<button class="prev" onclick="move(1)">やり直し</button>
</div>

</div>

<div class="total">
合計 ¥<span id="total">0</span>
</div>

<script>
const price={
polish:{
Light:{S:41800,M:49500,L:57200,'2L':64900},
Standard:{S:52800,M:60500,L:68200,'2L':75900},
Premium:{S:63800,M:71500,L:79200,'2L':86900}
},
coat:{
Entry:{S:14300,M:16500,L:18700,'2L':20900},
Standard:{S:27500,M:29700,L:31900,'2L':34100},
Premium:{S:40700,M:42900,L:45100,'2L':47300},
Executive:{S:57200,M:62700,L:68200,'2L':73700}
}
};

let sel={size:'S'};

function select(type,val){
sel[type]=val;

document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));
event.target.classList.add('selected');

if(type==="size"){
updatePrices();
}

calc();
}

function updatePrices(){
let s=sel.size;

p1.innerText="¥"+price.polish.Light[s].toLocaleString();
p2.innerText="¥"+price.polish.Standard[s].toLocaleString();
p3.innerText="¥"+price.polish.Premium[s].toLocaleString();

c1.innerText="¥"+price.coat.Entry[s].toLocaleString();
c2.innerText="¥"+price.coat.Standard[s].toLocaleString();
c3.innerText="¥"+price.coat.Premium[s].toLocaleString();
c4.innerText="¥"+price.coat.Executive[s].toLocaleString();
}

function calc(){
if(sel.coat==="Ultimate"){
total.innerText="ASK";
return;
}

let t=0;
if(sel.polish) t+=price.polish[sel.polish][sel.size];
if(sel.coat) t+=price.coat[sel.coat][sel.size];

total.innerText=t.toLocaleString();
}

function move(n){
document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
document.getElementById("step"+n)?.classList.add('active');
document.getElementById("result")?.classList.remove('active');
window.scrollTo(0,0);
}

function result(){
move("result");

summary.innerHTML=`
サイズ:${sel.size}<br>
研磨:${sel.polish}<br>
コート:${sel.coat}<br>
合計:¥${total.innerText}
`;
}

function sendLine(){
const msg=`見積\nサイズ:${sel.size}\n研磨:${sel.polish}\nコート:${sel.coat}\n合計:¥${total.innerText}`;
window.location.href=`https://line.me/R/oaMessage/@009zapmx/?${encodeURIComponent(msg)}`;
}

updatePrices();
</script>

</body>
</html>
