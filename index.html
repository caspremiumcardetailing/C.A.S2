<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーティング見積もり</title>

<style>
body{
  font-family:-apple-system;
  background:#f5f5f7;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

h2{ margin-bottom:10px; }

.desc{
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:15px;
  margin:6px 0;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

.recommend{
  border:2px solid #c9a100;
}

.gold{
  background:linear-gradient(45deg,#c9a100,#ffd700);
  color:#000;
}

.hidden{ display:none; }

.result{
  font-size:22px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<!-- STEP1 -->
<div id="step1" class="card">
<h2>STEP1：サイズ</h2>
<div class="desc">サイズを選ぶと代表車種が表示されます</div>

<button onclick="selectSize(0);showCar('s')">S（軽自動車）</button>
<button onclick="selectSize(7700);showCar('m')">M（小型普通車）</button>
<button onclick="selectSize(15400);showCar('l')">L（普通車・SUV・ミニバン）</button>
<button onclick="selectSize(23100);showCar('2l')">2L（大型）</button>

<div id="carExample" class="desc"></div>
</div>

<!-- STEP2 -->
<div id="step2" class="card hidden">
<h2>STEP2：研磨</h2>

<button onclick="toggle('p1')">Light ▼</button>
<div id="p1" class="desc hidden">
新車・納車から1年未満のお車におすすめ<br>
軽度のくすみや汚れを整えます<br>
<button onclick="selectPolish(41800)">この内容で選択</button>
</div>

<button onclick="toggle('p2')">Standard ▼</button>
<div id="p2" class="desc hidden">
2工程研磨で小傷やくすみをバランスよく除去<br>
<button onclick="selectPolish(52800)">この内容で選択</button>
</div>

<button class="recommend" onclick="toggle('p3')">
⭐ Premium（おすすめ）▼
</button>
<div id="p3" class="desc">
3工程研磨でより高い艶と仕上がりを実現<br>
仕上がり重視の方におすすめ<br>
<button onclick="selectPolish(63800)">この内容で選択</button>
</div>

</div>

<!-- STEP3 -->
<div id="step3" class="card hidden">
<h2>STEP3：コーティング</h2>

<button onclick="selectCoat(16500)">Basic</button>
<div class="desc">
撥水性能を付与し日常の汚れを落としやすくします<br>
コストを抑えたい方におすすめ
</div>

<button onclick="selectCoat(22000)">Standard</button>
<div class="desc">
艶・撥水・防汚のバランスが良い人気プラン
</div>

<button class="recommend" onclick="selectCoat(27500)">
⭐ Premium（おすすめ）
</button>
<div class="desc">
高い艶感と耐久性を両立<br>
長く綺麗に乗りたい方に最適
</div>

<button onclick="selectCoat(38000)">EX</button>
<div class="desc">
Premiumをベースにさらに艶・防汚性能を強化
</div>

<button class="gold" onclick="selectCoat(200000)">
🌟 G'ZOX ハイモース
</button>
<div class="desc">
完全別格のコーティング<br>
圧倒的な艶・存在感・所有満足
</div>

</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2>お見積もり</h2>
<div class="result" id="price"></div>
<div class="desc" id="comment"></div>
</div>

<script>

let total = 0;

// 車種例表示
function showCar(type){
  let text = "";

  if(type == "s"){
    text = "例：N-BOX・タント・ワゴンR";
  }
  if(type == "m"){
    text = "例：プリウス・カローラ・ノート";
  }
  if(type == "l"){
    text = "例：ハリアー・ヴォクシー・セレナ";
  }
  if(type == "2l"){
    text = "例：アルファード・ヴェルファイア・ハイエース・ランクル";
  }

  document.getElementById("carExample").innerText = text;
}

// 開閉
function toggle(id){
  let el = document.getElementById(id);
  el.classList.toggle("hidden");
}

// 選択
function selectSize(price){
  total += price;
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

function selectPolish(price){
  total += price;
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");
}

function selectCoat(price){
  total += price;

  document.getElementById("step3").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("price").innerText =
    "合計金額：" + total.toLocaleString() + "円";

  let comment = "";

  if(total < 90000){
    comment = "コストを抑えたプランです";
  }else if(total < 150000){
    comment = "人気のおすすめプランです";
  }else{
    comment = "最高クラスの仕上がりです";
  }

  document.getElementById("comment").innerText = comment;
}

</script>

</body>
</html>
